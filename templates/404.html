{% extends "base.html" %}

{% block content %}
<div class="bg-white max-w-md w-full p-10 rounded-3xl border border-slate-100 text-center space-y-6 shadow-sm">
    <div class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto border border-slate-100 text-3xl">
        🔍
    </div>
    <div class="space-y-2">
        <h1 class="text-4xl font-extrabold text-indigo-600">404</h1>
        <h2 class="text-xl font-extrabold text-slate-900">Page Not Found</h2>
        <p class="text-slate-500 text-sm">
            Sorry, the page you are looking for does not exist or has been moved.
        </p>
    </div>
    <div class="pt-2">
        <a href="/dashboard" 
           class="inline-block w-full py-3 px-5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-md transition-all active:scale-[0.98] text-sm">
            Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}

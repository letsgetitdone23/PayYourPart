{% extends "base.html" %}

{% block content %}
<div class="w-full max-w-md">
    <div class="glass p-8 rounded-3xl shadow-xl border border-purple-100 bg-white/80">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">Welcome Back</h1>
            <p class="text-xs sm:text-sm text-slate-500 mt-2">Log in to split your bills and settle balances</p>
        </div>

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label for="email" class="block text-xs font-semibold text-slate-700 mb-1.5 uppercase tracking-wider">Email Address</label>
                <input type="email" id="email" name="email" required autocomplete="email"
                       class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all text-sm"
                       placeholder="you@example.com">
            </div>

            <div>
                <div class="flex items-center justify-between mb-1.5">
                    <label for="password" class="block text-xs font-semibold text-slate-700 uppercase tracking-wider">Password</label>
                </div>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                       class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all text-sm"
                       placeholder="••••••••">
            </div>

            <button type="submit"
                    class="w-full py-3.5 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-md transition-all active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-indigo-500/30 text-sm">
                Log In
            </button>
        </form>

        <div class="mt-8 text-center border-t border-slate-100 pt-6">
            <p class="text-xs sm:text-sm text-slate-500">
                New to PayYourPart? 
                <a href="/register" class="font-bold text-indigo-600 hover:text-indigo-700 transition-colors ml-1">Create an account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
